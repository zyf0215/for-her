<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>要不要玩玩看，点击是的或者不呢？</title>
    <style>
        /* 全局样式：深邃星空渐变 */
        body {
            text-align: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            padding-top: 12vh; /* 使用视口单位，适应不同屏幕 */
            font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* 防止按钮跳出屏幕出现滚动条 */
            position: relative;
        }

        /* 霓虹发光标题 */
        h1 {
            font-size: 2.8em;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }

        /* 温柔的副标题 */
        p {
            font-size: 1.3em;
            color: #e0e0e0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255,255,255,0.4);
        }

        /* 按钮区域 */
        .btn-group {
            margin-top: 60px;
            position: relative;
            height: 100px;
        }

        /* 通用按钮样式 */
        button {
            padding: 12px 30px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 50px; /* 圆角按钮 */
            border: none;
            transition: all 0.3s ease; /* 增加过渡动画 */
            outline: none;
        }

        /* “是的”按钮：粉红渐变，带呼吸灯效果 */
        #yes-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            margin-right: 20px;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.5);
            position: relative;
            z-index: 10; /* 确保在“不”按钮上面 */
        }

        #yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.7);
        }

        /* “不”按钮：冷静灰，初始位置 */
        #no-btn {
            background-color: #808080;
            color: white;
            position: absolute; /* 关键：用于 JavaScript 控制位置 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* ==================== 流星特效 CSS ==================== */
        .night {
            position: fixed;
            width: 100%;
            height: 100%;
            transform: rotateZ(45deg);
            top: 0;
            left: 0;
            z-index: -1; /* 放在主体内容后面 */
        }

        .shooting_star {
            position: absolute;
            left: 50%;
            top: 50%;
            height: 2px;
            background: linear-gradient(-45deg, #5f91ff, rgba(0, 0, 255, 0));
            border-radius: 999px;
            filter: drop-shadow(0 0 6px #699bff);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        /* 为不同的流星设置不同的位置和延迟 */
        .shooting_star:nth-child(1) { top: 10%; left: 30%; animation-delay: 0s; }
        .shooting_star:nth-child(2) { top: 30%; left: 50%; animation-delay: 1s; }
        .shooting_star:nth-child(3) { top: 50%; left: 10%; animation-delay: 2s; }
        .shooting_star:nth-child(4) { top: 70%; left: 70%; animation-delay: 1.5s; }
        .shooting_star:nth-child(5) { top: 20%; left: 80%; animation-delay: 2.5s; }

        @keyframes tail {
            0% { width: 0; }
            30% { width: 100px; }
            100% { width: 0; }
        }

        @keyframes shooting {
            0% { transform: translateX(0); }
            100% { transform: translateX(300px); }
        }
    </style>
</head>
<body>

    <div class="night">
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
    </div>

    <h1>希竹，我可以问你一个问题吗？</h1>
    <p>你有没有想我？</p>

    <div class="btn-group">
        <button id="yes-btn" onclick="nextStep()">是的</button>
        <button id="no-btn" style="left: 55%; top: 0;" onmouseover="moveButton()" onclick="stayHere()">不</button>
    </div>

    <script>
        // 1. 让“不”按钮乱跳，并确保点不到 (优化了算法)
        function moveButton() {
            const btn = document.getElementById('no-btn');
            
            // 获取按钮的宽高
            const btnWidth = btn.clientWidth;
            const btnHeight = btn.clientHeight;

            // 设置边缘留白，防止按钮贴边或跳出屏幕
            const padding = 50; 

            // 计算可移动的有效区域
            const maxWidth = window.innerWidth - btnWidth - padding;
            const maxHeight = window.innerHeight - btnHeight - padding;

            // 生成随机坐标
            let x = Math.random() * maxWidth + padding / 2;
            let y = Math.random() * maxHeight + padding / 2;

            // 应用新坐标
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        // 2. 如果万一点到了“不”（虽然很难），就反复弹窗
        function stayHere() {
            let res = confirm("真的不吗？再考虑一下？😢");
            if (!res) {
                stayHere(); // 递归，点取消就一直弹
            } else {
                alert("我就知道你会选是的！🥰");
                nextStep();
            }
        }

        // 3. 点击“是的”进入下一步
        function nextStep() {
            // 弹出第一个对话框
            alert("✨ 开心！！！我也很想你！！！");
            // 弹出最后想说的话
            alert("我想对你说：\n\n接下来的日子，我都会在你身后。\n我也希望你能天天开心。❤️");
            
            // 跳转链接（如果需要）
            // window.location.href = "你的温馨图片链接.jpg"; 
        }
    </script>
</body>
</html>
